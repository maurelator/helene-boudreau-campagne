<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="don.page_title">Faire un don — Hélène Boudreau, Dieppe 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;1,400&family=Mulish:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Mulish',sans-serif;min-height:100vh;background:#0f1e2b;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6rem 2rem 2rem;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(26,45,74,0.5) 0%,transparent 60%),radial-gradient(ellipse at 75% 20%,rgba(42,80,128,0.2) 0%,transparent 50%);}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(168,200,232,0.15);border-radius:16px;padding:3.5rem 3.5rem;width:100%;max-width:520px;position:relative;z-index:2;backdrop-filter:blur(14px);box-shadow:0 24px 64px rgba(0,0,0,0.4);text-align:center;}
.heart{width:56px;height:56px;margin:0 auto 2rem;background:rgba(201,134,10,0.15);border:1.5px solid rgba(201,134,10,0.35);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#c9860a;}
.logo{font-family:'Spectral',serif;font-size:1rem;color:rgba(255,255,255,0.5);margin-bottom:2rem;letter-spacing:0.04em;}
.logo em{color:#7fa8d4;font-style:italic;}
h1{font-family:'Spectral',serif;font-size:2rem;font-weight:300;color:#fff;line-height:1.2;margin-bottom:1rem;}
h1 em{font-style:italic;color:#a8c8e8;}
p{font-size:0.95rem;line-height:1.8;color:rgba(255,255,255,0.55);margin-bottom:2.5rem;}
.coming-soon{display:inline-block;background:rgba(201,134,10,0.15);border:1.5px solid rgba(201,134,10,0.4);color:#e8a830;font-size:0.72rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;padding:0.55rem 1.4rem;border-radius:100px;margin-bottom:2.5rem;}
.back{display:inline-flex;align-items:center;gap:0.5rem;font-size:0.78rem;color:rgba(255,255,255,0.35);text-decoration:none;transition:color 0.2s;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;}
.back:hover{color:#a8c8e8;}
.back svg{transition:transform 0.2s;}
.back:hover svg{transform:translateX(-3px);}
</style>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="card">
  <div class="heart">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
  </div>
  <div class="logo">Hélène <em>Boudreau</em> — Dieppe 2026</div>
  <h1><span data-i18n="don.h1_a">Soutenir la</span> <em data-i18n="don.h1_em">campagne</em></h1>
  <span class="coming-soon" data-i18n="don.badge">Page en préparation</span>
  <p data-i18n="don.sub">Le formulaire de don en ligne sera disponible très prochainement. Merci de votre générosité et de votre soutien à la campagne d'Hélène Boudreau pour le District 4 de Dieppe.</p>
  <a href="/" class="back">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    <span data-i18n="don.back_btn">Retour au site</span>
  </a>
</div>
<script src="/navbar.js"></script>
</body>
</html>
