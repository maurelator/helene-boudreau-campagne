<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Admin — Campagne Hélène Boudreau</title>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;1,400&family=Mulish:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Mulish',sans-serif;min-height:100vh;background:#0f1e2b;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 60%,rgba(27,58,45,0.3) 0%,transparent 55%),radial-gradient(ellipse at 75% 30%,rgba(61,79,92,0.2) 0%,transparent 50%);}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(74,140,99,0.2);border-radius:14px;padding:3rem 3.5rem;width:100%;max-width:400px;position:relative;z-index:2;backdrop-filter:blur(14px);box-shadow:0 24px 64px rgba(0,0,0,0.4);}
.logo{text-align:center;margin-bottom:2.5rem;}
.logo-name{font-family:'Spectral',serif;font-size:1.4rem;color:#fff;font-weight:300;margin-bottom:0.25rem;}
.logo-name em{font-style:italic;color:#7fbfa0;}
.logo-sub{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.28);}
.lock{width:48px;height:48px;margin:0 auto 1.5rem;background:rgba(48,102,71,0.2);border:1px solid rgba(74,140,99,0.25);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#7fbfa0;}
.error{background:rgba(107,26,42,0.25);border:1px solid rgba(184,50,80,0.35);color:#f9a8b8;border-radius:6px;padding:0.7rem 1rem;font-size:0.8rem;margin-bottom:1.4rem;text-align:center;display:none;}
.fld{margin-bottom:1.1rem;}
.fld label{display:block;font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:0.45rem;}
.fld input{width:100%;padding:0.88rem 1.1rem;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);border-radius:7px;color:#fff;font-size:0.92rem;font-family:'Mulish',sans-serif;outline:none;transition:border-color 0.2s;}
.fld input:focus{border-color:rgba(74,140,99,0.55);}
.fld input::placeholder{color:rgba(255,255,255,0.22);}
.btn{width:100%;padding:0.95rem;background:linear-gradient(135deg,#306647,#1b3a2d);color:#fff;border:none;border-radius:7px;font-size:0.82rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;margin-top:0.4rem;transition:all 0.25s;box-shadow:0 6px 20px rgba(27,58,45,0.4);}
.btn:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(27,58,45,0.5);}
.back{text-align:center;margin-top:1.4rem;}
.back a{font-size:0.75rem;color:rgba(255,255,255,0.28);text-decoration:none;transition:color 0.2s;}
.back a:hover{color:#a8d4b8;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="lock">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>
    <div class="logo-name">Hélène <em>Boudreau</em></div>
    <div class="logo-sub">Panneau d'administration</div>
  </div>
  <div class="error" id="err">Identifiants incorrects. Réessayez.</div>
  <form method="POST" action="/admin/login">
    <div class="fld"><label>Utilisateur</label><input name="username" type="text" placeholder="admin" required autofocus></div>
    <div class="fld"><label>Mot de passe</label><input name="password" type="password" placeholder="••••••••" required></div>
    <button type="submit" class="btn">Se connecter</button>
  </form>
  <div class="back"><a href="/">Retour au site public</a></div>
</div>
<script>if(location.search.includes('error=1'))document.getElementById('err').style.display='block';</script>
</body>
</html>
